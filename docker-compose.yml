version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Backend connection URLs (adjust these based on your backend setup)
      - NEXT_PUBLIC_LOBBY_MANAGER_URL=http://localhost:8001
      - NEXT_PUBLIC_LOBBY_WS_BASE_URL=ws://localhost:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: snapscore_frontend
    driver: bridge