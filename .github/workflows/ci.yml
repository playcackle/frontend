# CI pipeline — runs on every PR and push to main.
# Gates: typecheck → test → build (all must pass to merge)
# Lint is optional until ESLint is fully configured.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Match the Node major Railway builds with (see railway.toml / package.json engines)
  NODE_VERSION: "20"
  # Dummy env vars required by the Vite build (not secret — just enough to pass validation)
  VITE_SUPABASE_URL: "https://placeholder.supabase.co"
  VITE_SUPABASE_ANON_KEY: "placeholder-anon-key"
  VITE_LOBBY_MANAGER_URL: "http://localhost:8001"
  VITE_PLAYER_SERVICE_URL: "http://localhost:8002"
  VITE_CONTENT_SERVICE_URL: "http://localhost:8003"
  SENTRY_AUTH_TOKEN: "" # Skip Sentry source map upload in CI

jobs:
  # ─── Typecheck ───────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict check
        run: npx tsc --noEmit

  # ─── Test ────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run --reporter=verbose

      - name: Run tests with coverage
        if: always()
        run: npx vitest run --coverage
        continue-on-error: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ─── Build ───────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      - name: Bundle size report
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh dist/ >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Top 20 JS files:" >> $GITHUB_STEP_SUMMARY
          find dist -name "*.js" | xargs du -sh 2>/dev/null | sort -rh | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
