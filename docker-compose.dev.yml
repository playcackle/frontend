version: '3.8'

services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      # Backend connection URLs for development
      - BACKEND_URL=http://host.docker.internal:8001
      - BACKEND_JOIN_URL=http://host.docker.internal:8000
      # NextAuth configuration
      - NEXTAUTH_URL=http://localhost:3000
      - AUTH_SECRET=Tyq8N0UATfZDomQLcUqxodFOLuedd87vRDfUV5Wq5r0=
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount source code for hot reloading
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    restart: unless-stopped

networks:
  default:
    name: snapscore_frontend_dev
    driver: bridge
