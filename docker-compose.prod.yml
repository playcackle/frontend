version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time environment variables for Next.js (update with your VPS IP)
        - BACKEND_URL=http://34.51.183.78:8001
        - BACKEND_JOIN_URL=http://34.51.183.78:8000
    ports:
      # Bind to all interfaces for external access
      - "0.0.0.0:3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Runtime environment variables (update with your VPS IP)
      - BACKEND_URL=http://34.51.183.78:8001
      - BACKEND_JOIN_URL=http://34.51.183.78:8000
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # NextAuth configuration (update with your VPS IP)
      - NEXTAUTH_URL=http://34.51.183.78:3000
      - AUTH_SECRET=Tyq8N0UATfZDomQLcUqxodFOLuedd87vRDfUV5Wq5r0=
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    name: snapscore_frontend
    driver: bridge
